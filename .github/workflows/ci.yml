name: Booking App CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install backend dependencies
        run: |
          pip install -r Booking-Backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        env:
          MONGODB_URL: mongodb://mongodb:27017
          DATABASE_NAME: booking_app
          SECRET_KEY: testsecret
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 1440
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: admin123
        run: pytest Booking-Backend


  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          CI=false npm run build
