name: Deploy Booking App (EC2 + S3 + MongoDB Atlas)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  BACKEND_IMAGE: booking-backend

jobs:

  build-and-push-backend:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build Docker image
      - name: Build backend Docker image
        run: |
          docker build -t $BACKEND_IMAGE ./Booking-Backend

      # 5️⃣ Tag and Push Docker image to ECR
      - name: Push image to ECR
        run: |
          docker tag $BACKEND_IMAGE:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$BACKEND_IMAGE:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$BACKEND_IMAGE:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-backend

    steps:

      # 6️⃣ Configure AWS credentials again (for S3 upload)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 7️⃣ Deploy backend on EC2
      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Login to ECR..."
            aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            echo "Stopping old container..."
            docker stop backend || true
            docker rm backend || true

            echo "Pulling latest image..."
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/booking-backend:latest

            echo "Starting new container..."
            docker run -d \
              --name backend \
              -p 8000:8000 \
              -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ACCESS_TOKEN_EXPIRE_MINUTES="${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
              -e ALGORITHM="${{ secrets.ALGORITHM }}" \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/booking-backend:latest


      # 8️⃣ Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 9️⃣ Upload frontend to S3
      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/build s3://booking-app-frontend --delete
