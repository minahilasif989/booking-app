name: Deploy Booking App (EC2 + S3 + MongoDB Atlas)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  BACKEND_IMAGE: booking-backend

jobs:

  build-and-push-backend:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Login to ECR
      - uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build backend Docker image
      - name: Build backend Docker image
        run: docker build -t $BACKEND_IMAGE ./Booking-Backend

      # 5️⃣ Tag & Push to ECR
      - name: Push backend image to ECR
        run: |
          docker tag $BACKEND_IMAGE:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$BACKEND_IMAGE:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$BACKEND_IMAGE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-backend

    steps:
      # 6️⃣ Deploy backend to EC2
      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Stopping old backend..."
            docker stop backend || true
            docker rm backend || true

            echo "Pulling latest backend image..."
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/booking-backend:latest

            echo "Running backend container..."
            docker run -d \
              --name backend \
              -p 8000:8000 \
              -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ACCESS_TOKEN_EXPIRE_MINUTES="${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
              -e ALGORITHM="${{ secrets.ALGORITHM }}" \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/booking-backend:latest

      # 7️⃣ Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 8️⃣ Upload frontend to S3
      - name: Upload frontend build to S3
        run: |
          aws s3 sync frontend/build s3://booking-app-frontend --delete
