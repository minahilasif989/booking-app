name: Deploy Booking App (EC2 + S3 + MongoDB Atlas)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:


# JOB 1 — Build & Push Backend

  build-and-push-backend:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Backend Docker Image
        run: |
          docker build -t $ECR_REPOSITORY ./Booking-Backend

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker Image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest



# JOB 2 — Deploy + Frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ───── Deploy Backend to EC2 ─────
      - name: Deploy Backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Login to ECR"
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            echo "Stop old container"
            docker stop backend || true
            docker rm backend || true

            echo "Pull latest image"
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

            echo "Run backend container"
            docker run -d \
              --name backend \
              -p 8000:8000 \
              -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ACCESS_TOKEN_EXPIRE_MINUTES="${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
              -e ALGORITHM="${{ secrets.ALGORITHM }}" \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build React App
        run: |
          cd frontend
          CI=false npm run build
          
      - name: Test S3 Access
        run: aws s3 ls s3://bookingappfrontend
        
      - name: Upload Frontend to S3
        run: |
          aws s3 sync frontend/build s3://booking-app-frontend --delete
