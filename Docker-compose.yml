version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: booking_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./Booking-Backend
    container_name: booking_backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    env_file:
      - ./Booking-Backend/.env

  frontend:
    build: ./frontend
    container_name: booking_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000

volumes:
  mongo_data:
