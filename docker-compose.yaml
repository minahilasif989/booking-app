version: "3.9"

services:

  mongo:
    image: mongo:6
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: booking_app
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  backend:
    build: ./Booking-Backend
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./Booking-Backend/.env
    depends_on:
      - mongo
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge